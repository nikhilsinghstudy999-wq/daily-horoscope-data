name: "Horoscope Batch 1 (Simha – Tula)"

on:
  schedule:
    - cron: '30 19 * * *'   # 1:00 AM IST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-
      - run: pip install -r requirements.txt
      - name: Generate batch
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BATCH_START: '4'
          BATCH_END: '8'
        run: python generate_horoscopes.py
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Batch 1: Simha‑Tula $(date +%Y-%m-%d)"
          git push
