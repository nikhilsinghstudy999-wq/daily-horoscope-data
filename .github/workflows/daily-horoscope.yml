name: "Daily Horoscope Generation"

on:
  schedule:
    # Twice a day to absolutely avoid missing a day (00:30 and 12:30 UTC)
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:   # Manual trigger

concurrency:
  group: horoscope-generation
  cancel-in-progress: false   # Queue; don't cancel a running job

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # Kill if it hangs
    permissions:
      contents: write          # Needed to push the updated JSON
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate horoscopes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python generate_horoscopes.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/horoscopes.json
          git diff --staged --quiet || git commit -m "Update daily horoscopes $(date +%Y-%m-%d)"
          git push
