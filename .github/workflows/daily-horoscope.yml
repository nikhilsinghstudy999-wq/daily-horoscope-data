name: "Daily Horoscope – Batched (3 runs/day)"

on:
  schedule:
    # Batch 0 (rashi 0‑3) at 00:30 UTC (6:00 AM IST)
    - cron: '30 0 * * *'
    # Batch 1 (rashi 4‑7) at 08:30 UTC (2:00 PM IST)
    - cron: '30 8 * * *'
    # Batch 2 (rashi 8‑11) at 16:30 UTC (10:00 PM IST)
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      BATCH_START:
        description: 'Start index (0‑11)'
        required: false
        default: '0'
      BATCH_END:
        description: 'End index (exclusive)'
        required: false
        default: '12'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate horoscopes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BATCH_START: ${{ github.event.inputs.BATCH_START || '0' }}
          BATCH_END: ${{ github.event.inputs.BATCH_END || '12' }}
        run: python generate_horoscopes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update daily horoscopes $(date +%Y-%m-%d) batch"
          git push
