name: "Daily Horoscope Generation (SambaNova)"

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST
    - cron: '30 12 * * *'  # 18:00 IST
  workflow_dispatch:

concurrency:
  group: horoscope-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate horoscopes
        env:
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: python generate_horoscopes.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/horoscopes.json
          git diff --staged --quiet || git commit -m "Update daily horoscopes $(date +%Y-%m-%d)"
          git push
