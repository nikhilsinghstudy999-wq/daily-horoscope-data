name: "Daily Horoscope Generation (Multi‑Provider)"

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

concurrency:
  group: horoscope-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate horoscopes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_horoscopes.py

      - name: Validate generated JSON
        run: |
          python -c "
          import json
          with open('data/horoscopes.json', 'r') as f:
              data = json.load(f)
          required = ['date','run_timestamp','rashi_horoscopes']
          assert all(k in data for k in required), 'Missing top-level keys'
          assert len(data['rashi_horoscopes']) == 12, 'Not all 12 rashis present'
          print('✓ JSON validation passed')
          "

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/horoscopes.json
          git diff --staged --quiet || git commit -m "Update daily horoscopes $(date +%Y-%m-%d)"
          git push
